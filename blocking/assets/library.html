<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>blocking · library</title>
<style>
/* paper-theater :: blocking library (template v1.0) — the shelf of model maps.
   Self-contained; regenerated by the blocking skill from index.md each run. */
:root{
  --paper:#FFF1E5; --card:#FFF9F1; --edge:#E4CDB9; --edge-strong:#C9AD93;
  --ink:#33302E; --soft:#8A7B6E; --accent:#990F3D; --link:#0D7680;
  --shadow:rgba(74,44,20,.14);
}
@media (prefers-color-scheme: dark){
  :root:not([data-theme="light"]){
    --paper:#191512; --card:#231C17; --edge:#3E332A; --edge-strong:#57483B;
    --ink:#EDE4D8; --soft:#A6988A; --accent:#E8798F; --link:#54B3BC;
    --shadow:rgba(0,0,0,.5);
  }
}
:root[data-theme="dark"]{
  --paper:#191512; --card:#231C17; --edge:#3E332A; --edge-strong:#57483B;
  --ink:#EDE4D8; --soft:#A6988A; --accent:#E8798F; --link:#54B3BC;
  --shadow:rgba(0,0,0,.5);
}
*{box-sizing:border-box}
body{margin:0;background:var(--paper);color:var(--ink);min-height:100vh;
  font:14.5px/1.55 "Charter","Iowan Old Style",Georgia,serif}
.wrap{max-width:760px;margin:0 auto;padding:34px 22px 60px}
h1{font-family:"Didot","Bodoni MT","Baskerville",Georgia,serif;font-size:26px;margin:0}
h1 .act{color:var(--accent);font-style:italic;font-weight:400}
.folio{font-family:ui-sans-serif,system-ui,sans-serif;font-size:10.5px;
  letter-spacing:.14em;text-transform:uppercase;color:var(--soft);margin-top:3px}
hr.dbl{border:0;border-top:1px solid var(--edge-strong);border-bottom:1px solid var(--edge-strong);
  height:3px;background:none;margin:12px 0 18px}
#q{width:100%;padding:8px 12px;font:inherit;color:var(--ink);background:var(--card);
  border:1px solid var(--edge-strong);border-radius:3px;margin-bottom:18px}
#q:focus{outline:2px solid var(--link);outline-offset:1px}
a.map{display:block;text-decoration:none;color:inherit;background:var(--card);
  border:1px solid var(--edge);border-left:4px solid var(--accent);border-radius:3px;
  padding:12px 16px;margin:10px 0;box-shadow:0 1px 3px var(--shadow);
  transition:box-shadow .15s}
a.map:hover{box-shadow:0 3px 12px var(--shadow)}
a.map .t{font-family:"Didot","Bodoni MT","Baskerville",Georgia,serif;
  font-size:17px;font-weight:700}
a.map .m{font-family:ui-sans-serif,system-ui,sans-serif;font-size:10.5px;
  letter-spacing:.1em;text-transform:uppercase;color:var(--soft);margin-top:3px}
a.map .m .fl{color:var(--accent)}
a.map .p{font-size:11.5px;color:var(--soft);margin-top:4px;font-style:italic;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.empty{color:var(--soft);font-style:italic;padding:20px 0}
.foot{margin-top:26px;padding-top:12px;border-top:1px solid var(--edge);
  font-size:12px;color:var(--soft);font-style:italic}
.theme{float:right;background:none;border:1px solid var(--edge-strong);color:var(--soft);
  border-radius:3px;cursor:pointer;padding:2px 9px;font-size:12px}
</style>
</head>
<body>
<div class="wrap">
  <button class="theme" id="themeBtn">◐</button>
  <h1><span class="act">blocking ·</span> library</h1>
  <div class="folio" id="count"></div>
  <hr class="dbl">
  <input id="q" type="search" placeholder="filter by title, slug, or source…" autofocus>
  <div id="list"></div>
  <div class="foot">To add a map: run <b>blocking</b> on any model, in any project — it
  registers here automatically. To remove or rename one: ask Claude (the registry is
  <span style="font-family:ui-monospace,Menlo,monospace;font-style:normal;font-size:11px">index.md</span>
  beside this file). Each map is a single self-contained file in
  <span style="font-family:ui-monospace,Menlo,monospace;font-style:normal;font-size:11px">maps/</span>
  — copy, email, or archive freely.</div>
</div>

<!-- ==== LIBRARY DATA (the skill regenerates this payload from index.md) ==== -->
<script id="library-data" type="application/json">
[]
</script>

<script>
"use strict";
const maps=JSON.parse(document.getElementById("library-data").textContent)
  .sort((a,b)=>(b.date||"").localeCompare(a.date||""));
const list=document.getElementById("list"), q=document.getElementById("q");
function esc(s){return String(s??"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}
function render(){
  const f=q.value.trim().toLowerCase();
  const hit=maps.filter(m=>!f||[m.title,m.slug,m.source,m.project]
    .some(x=>(x||"").toLowerCase().includes(f)));
  document.getElementById("count").textContent=
    `${maps.length} map${maps.length===1?"":"s"} on the shelf`+(f?` · ${hit.length} match`:"");
  list.innerHTML=hit.map(m=>`<a class="map" href="maps/${encodeURIComponent(m.slug)}.html">
      <div class="t">${esc(m.title)}</div>
      <div class="m">${esc(m.date)} · ${esc(m.parts)} parts ·
        <span class="fl">${esc(m.flags)} flags</span> · ${esc(m.source)}</div>
      <div class="p">${esc(m.project)}</div></a>`).join("")
    ||`<div class="empty">Nothing${f?" matching":""} on the shelf yet.</div>`;
}
q.addEventListener("input",render);
document.getElementById("themeBtn").addEventListener("click",()=>{
  const r=document.documentElement;
  r.dataset.theme=(r.dataset.theme==="dark"||(!r.dataset.theme&&matchMedia("(prefers-color-scheme: dark)").matches))?"light":"dark";
});
render();
</script>
</body>
</html>
